name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  elm:
    name: Build + tests (elm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elm 0.19.1
        run: |
          curl -sSL https://github.com/elm/compiler/releases/download/0.19.1/binary-for-linux-64-bit.gz \
            | gunzip > /usr/local/bin/elm
          chmod +x /usr/local/bin/elm
          elm --version

      - name: Cache ELM_HOME
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: elm-home-${{ hashFiles('elm.json') }}

      # elm-test is a Node CLI; Bun cannot currently drive it.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify docs build
        run: elm make --docs=/tmp/docs.json

      # elm 0.19.1's client-side docs.json parser has a byte-position-sensitive
      # bug with raw multi-byte UTF-8: depending on where a character lands in
      # the file, elm diff/bump/publish fail with PROBLEM LOADING DOCS for every
      # consumer, permanently (published bytes are immutable). Pure-ASCII docs
      # are immune, so doc comments must stay ASCII.
      - name: Docs must be pure ASCII (elm 0.19.1 parser bug guard)
        run: |
          if grep -qP '[^\x00-\x7F]' /tmp/docs.json; then
            echo 'docs.json contains raw non-ASCII bytes; replace them with ASCII in doc comments'
            grep -nP '[^\x00-\x7F]' /tmp/docs.json | head -5
            exit 1
          fi

      - name: Run test suite
        run: npx --yes elm-test@0.19.1-revision12 --compiler /usr/local/bin/elm

  tlc:
    name: Model-check TLA+ specs (TLC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Fetch tla2tools
        run: |
          mkdir -p "$HOME/.local/share/tla"
          curl -sSL -o "$HOME/.local/share/tla/tla2tools.jar" \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar

      - name: Run TLC on every spec
        run: ./proofs/tla/check-tla.sh
